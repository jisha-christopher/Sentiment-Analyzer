<!DOCTYPE html>
<html>

<head>

<title>🤖 AI Sentiment Analyzer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#ff6ec4,
#7873f5,
#4facfe
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container{

width:850px;

background:
rgba(255,255,255,0.18);

backdrop-filter:blur(20px);

padding:40px;

border-radius:30px;

box-shadow:
0 20px 60px rgba(0,0,0,.25);

text-align:center;

color:white;

}

h1{

font-size:42px;

margin-bottom:25px;

}

.subtitle{

margin-bottom:20px;

font-size:18px;

opacity:.9;

}

textarea{

width:100%;

height:140px;

padding:20px;

border:none;

border-radius:18px;

font-size:18px;

outline:none;

resize:none;

background:white;

color:#333;

box-shadow:
0 8px 20px rgba(0,0,0,.12);

}

button{

margin-top:20px;

padding:16px 40px;

font-size:20px;

border:none;

border-radius:50px;

background:

linear-gradient(
90deg,
#ff512f,
#dd2476
);

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:
0 10px 30px rgba(255,0,120,.4);

}

.result{

margin-top:30px;

padding:25px;

border-radius:20px;

background:

rgba(255,255,255,.2);

}

.result h2{

font-size:30px;

margin-bottom:10px;

}

.result h3{

font-size:22px;

}

.chart{

margin-top:40px;

padding:15px;

background:white;

border-radius:20px;

}

.footer{

margin-top:25px;

font-size:14px;

opacity:.8;

}

</style>

</head>

<body>

<div class="container">

<h1>
🤖 AI Sentiment Analyzer
</h1>

<div class="subtitle">

Analyze social media & product reviews using AI

</div>

<form method="POST">

<textarea
name="review"
placeholder="Type your review here..."
required></textarea>

<br>

<button type="submit">

🚀 Analyze Sentiment

</button>

</form>

{% if sentiment %}

<div class="result">

<h2>

{{ sentiment }}

</h2>

<h3>

Confidence Score:
{{ score }}

</h3>

</div>

{% endif %}

{% if chart %}

<div class="chart">

{{ chart|safe }}

</div>

{% endif %}

<div class="footer">

Built with ❤️ Flask + Transformers + MongoDB

</div>

</div>

</body>

</html>
